version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: finance-manager-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_EXTERNAL_PORT}:5432"
    volumes:
      - finance_manager_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: finance-manager-backend
    ports:
      - "${BACKEND_PORT}:8080"
    env_file:
      - .env
    # We keep DB_HOST here if we want to ensure it uses the internal network name 'db'
    # but the user wanted it from .env, so we let .env provide it.
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: finance-manager-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  finance_manager_data:
